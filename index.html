<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매일 매일 To-Do List</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        li:last-child {
            border-bottom: none;
        }
        .task-text {
            flex: 1;
            font-size: 16px;
            cursor: pointer;
        }
        .completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        .delete-btn {
            background-color: #ff4c4c;
            padding: 6px 10px;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #ff3333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 오늘의 할 일</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="할 일을 입력하세요..." onkeypress="if(event.keyCode==13) document.getElementById('addBtn').click()">
        <button id="addBtn">추가</button>
    </div>
    <ul id="taskList">
        </ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🔴 중요: 본인의 Firebase 프로젝트 설정 값으로 교체하세요!
    const firebaseConfig = {
  apiKey: "AIzaSyBPhSpbtxBXyFQs1D0oUg7RG-PRnsghRBM",
  authDomain: "todo-46112.firebaseapp.com",
  projectId: "todo-46112",
  storageBucket: "todo-46112.firebasestorage.app",
  messagingSenderId: "119160665543",
  appId: "1:119160665543:web:df34d62a843fd5a6c595e2",
  measurementId: "G-08K3H93LP9"
};

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const todosCollection = collection(db, "todos");

    // DOM 요소
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');

    // 1. 할 일 추가하기
    addBtn.addEventListener('click', async () => {
        const text = taskInput.value.trim();
        if (text === '') {
            alert('할 일을 입력해주세요!');
            return;
        }
        try {
            await addDoc(todosCollection, {
                text: text,
                completed: false,
                createdAt: serverTimestamp() // 작성 시간 순 정렬을 위해 추가
            });
            taskInput.value = ''; // 입력창 비우기
        } catch (e) {
            console.error("Error adding document: ", e);
        }
    });

    // 2. 실시간으로 데이터 불러오기 (Read)
    // createdAt 기준으로 내림차순(최신순) 정렬
    const q = query(todosCollection, orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        taskList.innerHTML = ''; // 기존 목록 초기화
        snapshot.forEach((documentSnapshot) => {
            const task = documentSnapshot.data();
            const id = documentSnapshot.id;

            // li 요소 생성
            const li = document.createElement('li');
            if (task.completed) li.classList.add('completed');

            // 체크박스 생성
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = task.completed;
            
            // 3. 상태 변경하기 (Update)
            checkbox.addEventListener('change', async () => {
                const taskRef = doc(db, "todos", id);
                await updateDoc(taskRef, {
                    completed: checkbox.checked
                });
            });

            // 텍스트 영역
            const span = document.createElement('span');
            span.textContent = task.text;
            span.className = 'task-text';
            // 텍스트 클릭해도 체크박스 토글되게 연결
            span.addEventListener('click', () => {
                checkbox.click();
            });

            // 4. 삭제 버튼 만들기 (Delete)
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '삭제';
            deleteBtn.className = 'delete-btn';
            deleteBtn.addEventListener('click', async () => {
                if(confirm('정말 삭제하시겠습니까?')) {
                    const taskRef = doc(db, "todos", id);
                    await deleteDoc(taskRef);
                }
            });

            // 요소 조합
            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);
        });
    });
</script>

</body>
</html>
